# List Builder client config template.
# Copy this file to clients/{slug}.yaml and fill in the fields.
# Required: client_name, icp_description, target_titles
# Everything else is optional.

client_name: "Client Name"
apollo_key_env: APOLLO_API_KEY   # env var name for this client's Apollo key

# TAM mode: if set, pulls from this Apollo label (pre-built contact pool)
# If not set, runs a live Apollo search using the filters below (fresh mode)
# apollo_label_id: ""

# List source tier — determines data provenance for routing decisions:
#   A = 1st party (website visitors, LinkedIn engagers, content engagers)
#   B = 2nd party (champion job changes, partner overlap, intent providers)
#   C = 3rd party (Apollo firmographic, hiring databases) — default
# Apollo pulls are Tier C unless you're enriching from 1st/2nd party sources upstream.
list_source_tier: C

# One sentence describing the ideal company. Used for Perplexity ICP qualification.
icp_description: "B2B companies building [X] as their core product"

# Contact targeting
target_titles:
  - CTO
  - VP Engineering
  - VP of AI
  - Head of Engineering
  - Co-Founder
  - Founder

seniority:
  - c_suite
  - vp
  - director
  - founder

# Company filters (used in fresh mode)
employee_range:
  - "11,200"
  - "201,1000"
  - "1001,5000"

locations:
  - United States
  - Canada

# Apollo tech stack filters (optional — narrows to companies using specific tools)
# tech_signals:
#   - livekit
#   - elevenlabs

# Domains and industries to exclude from results
exclusions:
  domains: []
  industries: []

# GitHub code search queries for tech signal detection (optional)
# Uses `gh` CLI — must be authenticated. Rate limit: 10 req/min.
# github_queries:
#   - '"your-sdk" language:Python'
#   - 'YOUR_API_KEY filename:.env.example'

# Scoring overrides (optional — tune the heuristic weights)
# scoring:
#   max_tier: 2                 # 1=only best, 2=best+good (default), 3=all
#   weights:
#     tld_ai: 20                # override specific weight
#     emp_under_50: 5
