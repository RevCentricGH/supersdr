name: Build per-skill ZIPs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIPs for skills containing SKILL.md
        run: |
          dist_dir="$GITHUB_WORKSPACE/dist"
          mkdir -p "$dist_dir"
          for dir in skills/*/; do
            dir="${dir%/}"
            name="$(basename "$dir")"
            if [ -f "$dir/SKILL.md" ]; then
              echo "Zipping $name"
              (cd "$dir" && zip -r "$dist_dir/$name.zip" .)
            fi
          done
          echo "Built:"
          ls -la "$dist_dir"

      - name: Replace 'latest' release with fresh ZIPs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --target "${{ github.sha }}" \
            --title "Latest skills (auto-built from main)" \
            --notes "Per-skill ZIPs auto-built from the latest \`main\` commit. The README's Download ZIP links resolve here once swapped to native GitHub release URLs." \
            dist/*.zip

      - name: Verify release assets match skills/
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          expected=$(ls -d skills/*/ | wc -l)
          actual=$(gh release view latest --json assets --jq '[.assets[].name] | length')
          echo "Expected $expected ZIPs, release has $actual"
          if [ "$actual" -ne "$expected" ]; then
            echo "Release asset count mismatch; 'latest' is not current."
            exit 1
          fi
          for dir in skills/*/; do
            name="$(basename "${dir%/}")"
            if ! gh release view latest --json assets --jq '.assets[].name' | grep -qx "$name.zip"; then
              echo "Missing asset: $name.zip"
              exit 1
            fi
          done
          echo "All $expected skill ZIPs present on the 'latest' release."
